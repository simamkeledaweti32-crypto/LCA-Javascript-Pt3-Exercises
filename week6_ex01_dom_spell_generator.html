<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Spell Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: white;
      padding: 20px;
    }
    h1 {
      color: #e94560;
    }
   .spellArea {
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      max-width: 400px;
      min-height: 80px;
      border-radius: 10px;
      background: #16213e;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #ff6b81;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Welcome to the Magical Spell Generator!</h1>

  <ul id="ingredientList">
    <li>Dragon Scale</li>
    <li>Phoenix Feather</li>
    <li>Unicorn Horn</li>
  </ul>

  <button id="generateButton">Generate Spell</button>
  <button id="resetButton">Reset</button>

  <div class="spellArea" id="spellArea">Your spell will appear here...</div>

  <script>
    const ingredients = ["Dragon Scale", "Phoenix Feather", "Unicorn Horn"];
    const spellArea = document.getElementById("spellArea");
    const generateButton = document.getElementById("generateButton");
    const resetButton = document.getElementById("resetButton");

    // Task 3: Make the button work + Task 4: Change background color
    generateButton.addEventListener("click", () => {
      runCountdown();
    });

    // Task 5: Countdown to Magic
    function runCountdown() {
      let count = 3;
      spellArea.style.background = "#16213e";
      spellArea.textContent = count;

      const countdown = setInterval(() => {
        count--;
        if (count > 0) {
          spellArea.textContent = count;
        } else {
          clearInterval(countdown);
          showSpell();
        }
      }, 1000);
    }

    function showSpell() {
      // Pick random ingredient
      const randomIndex = Math.floor(Math.random() * ingredients.length);
      const chosenIngredient = ingredients[randomIndex];
      
      // Display spell
      spellArea.textContent = `You cast a spell with ${chosenIngredient}! ✨`;
      
      // Change background to random color
      const randomColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 30%)`;
      spellArea.style.background = randomColor;
    }

    // Task 6: Reset button
    resetButton.addEventListener("click", () => {
      spellArea.textContent = "Your spell will appear here...";
      spellArea.style.background = "#16213e";
    });
  </script>
</body>
</html>

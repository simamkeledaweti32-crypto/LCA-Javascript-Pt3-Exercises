<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Profile Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    #profileCard {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
      transition: all 0.3s ease;
    }
    #profileCard.active-status {
      background: #d4edda;
      border: 2px solid #28a745;
    }
    #profileImage {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    h2 {
      margin: 15px 0 5px;
      color: #333;
    }
    p {
      color: #666;
      margin: 5px 0 15px;
    }
    button {
      margin: 5px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div id="profileCard">
    <img id="profileImage" src="https://placehold.co/100x100" alt="Profile Image">
    <h2 id="profileName">John Doe</h2>
    <p id="profileRole">Software Developer</p>
    <p id="profileBio">Passionate about coding and learning new technologies.</p>
    
    <button id="updateNameBtn">Update Name</button>
    <button id="updateRoleBtn">Update Role</button>
    <button id="toggleStatusBtn">Toggle Active Status</button>
    <button id="changeImageBtn">Change Image</button>
  </div>

  <script>
    // Get elements
    const profileCard = document.getElementById("profileCard");
    const profileName = document.getElementById("profileName");
    const profileRole = document.getElementById("profileRole");
    const profileImage = document.getElementById("profileImage");

    // Task 2: Update Name
    document.getElementById("updateNameBtn").addEventListener("click", () => {
      let newName = prompt("Enter new name:");
      if (newName) {
        profileName.textContent = newName;
      }
    });

    // Task 2: Update Role
    document.getElementById("updateRoleBtn").addEventListener("click", () => {
      let newRole = prompt("Enter new role:");
      if (newRole) {
        profileRole.textContent = newRole;
      }
    });

    // Task 3: Toggle Active Status
    document.getElementById("toggleStatusBtn").addEventListener("click", () => {
      profileCard.classList.toggle("active-status");
    });

    // Task 4 Bonus: Change Image
    document.getElementById("changeImageBtn").addEventListener("click", () => {
      let newImageUrl = prompt("Enter new image URL:");
      if (newImageUrl) {
        profileImage.src = newImageUrl;
      }
    });
  </script>
</body>
</html>

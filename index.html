<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechConnect Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container my-4">
    <h1 class="mb-3">Developer Community Hub</h1>
    
    <div class="row mb-3 g-2">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name, role, skill...">
      </div>
      <div class="col-md-3">
        <button id="viewToggleBtn" class="btn btn-outline-primary w-100">Toggle View</button>
      </div>
      <div class="col-md-3">
        <button id="hireToggleBtn" class="btn btn-outline-success w-100">Show Available Only</button>
      </div>
    </div>

    <p><strong>Showing:</strong> <span id="developerCount">0</span> developers</p>

    <div id="developerGrid" class="row g-3"></div>

    <div id="developerTable" class="table-responsive d-none">
      <table class="table table-striped">
        <thead>
          <tr><th>Avatar</th><th>Name</th><th>Role</th><th>Location</th><th>Hire</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <h3 class="mt-5">Add Developer</h3>
    <form id="addDeveloperForm" class="row g-2">
      <div class="col-md-3"><input type="text" id="name" class="form-control" placeholder="Name" required></div>
      <div class="col-md-3"><input type="text" id="role" class="form-control" placeholder="Role" required></div>
      <div class="col-md-3"><input type="text" id="location" class="form-control" placeholder="Location" required></div>
      <div class="col-md-3"><input type="text" id="skills" class="form-control" placeholder="Skills comma separated" required></div>
      <div class="col-12"><button type="submit" class="btn btn-primary">Add Developer</button></div>
    </form>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
